<!DOCTYPE html>
<html>
<head>
    <title>后端上传测试</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <h1>后端文件上传测试</h1>
    <p>后端地址: http://localhost:3002</p>
    
    <div>
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">上传测试</button>
    </div>
    
    <div id="result" class="result"></div>
    
    <script>
    function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        const resultDiv = document.getElementById('result');
        
        if (!file) {
            resultDiv.innerHTML = '<div class="error">请选择文件</div>';
            return;
        }
        
        resultDiv.innerHTML = `<div class="info">上传中: ${file.name} (${(file.size/1024).toFixed(2)} KB)...</div>`;
        
        const formData = new FormData();
        formData.append('file', file);
        
        fetch('http://localhost:3002/api/check/ai', {
            method: 'POST',
            body: formData
        })
        .then(response => {
            console.log('响应状态:', response.status);
            if (!response.ok) {
                return response.json().then(data => {
                    throw new Error(data.error || data.message || '上传失败');
                });
            }
            return response.json();
        })
        .then(data => {
            console.log('响应数据:', data);
            
            if (data.success) {
                resultDiv.innerHTML = `
                    <div class="success">
                        <h3> 上传成功！</h3>
                        <p>找到 ${data.data.count} 个错别字</p>
                        <p>文件类型: ${data.data.fileInfo.type}</p>
                        <p>文本长度: ${data.data.stats.totalChars} 字符</p>
                        <p>错误率: ${(data.data.stats.errorRate * 100).toFixed(2)}%</p>
                        <details>
                            <summary>查看详情</summary>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </details>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3> 失败: ${data.error}</h3>
                        <p>原因: ${data.message}</p>
                        ${data.hint ? `<p>提示: ${data.hint}</p>` : ''}
                        ${data.retrySteps ? `
                            <h4>建议:</h4>
                            <ul>${data.retrySteps.map(step => `<li>${step}</li>`).join('')}</ul>
                        ` : ''}
                    </div>
                `;
            }
        })
        .catch(error => {
            console.error('错误:', error);
            resultDiv.innerHTML = `<div class="error">错误: ${error.message}</div>`;
        });
    }
    </script>
</body>
</html>
